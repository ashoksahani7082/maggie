<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAY BOY JOB SERVICE - Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f172a; /* Slate 900 */
        }
        .hindi-text {
            font-family: 'Noto Sans Devanagari', sans-serif;
        }
        
        /* Custom Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 15px rgba(236, 72, 153, 0.5); }
            50% { box-shadow: 0 0 30px rgba(236, 72, 153, 0.9); }
        }
        .btn-glow {
            animation: pulse-glow 2s infinite;
        }
    </style>
</head>
<body class="min-h-screen relative overflow-x-hidden flex items-center justify-center p-4 selection:bg-pink-500 selection:text-white">

    <!-- Ambient Background Glows -->
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-purple-600 rounded-full mix-blend-screen filter blur-[100px] opacity-40 animate-pulse"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-pink-600 rounded-full mix-blend-screen filter blur-[100px] opacity-40 animate-pulse" style="animation-delay: 1s;"></div>

    <!-- Main Content Container -->
    <div class="relative z-10 w-full max-w-md bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-8 shadow-[0_8px_32px_0_rgba(0,0,0,0.37)] flex flex-col items-center text-center transform transition-all">
        
        <!-- Premium Badge -->
        <div class="mb-4 px-4 py-1.5 rounded-full bg-gradient-to-r from-pink-500/20 to-purple-500/20 border border-pink-500/30">
            <span class="text-pink-300 text-xs font-bold tracking-[0.2em] uppercase">Premium VIP Access</span>
        </div>

        <!-- Main Heading -->
        <h1 class="text-3xl sm:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-white via-gray-200 to-gray-400 mb-2 uppercase tracking-wide">
            Play Boy<br/><span class="text-pink-500">Job Service</span>
        </h1>

        <!-- Sub Heading in Hindi -->
        <h2 class="hindi-text text-4xl sm:text-5xl font-bold text-white mb-6 drop-shadow-lg">
            रियल मीटिंग
        </h2>

        <!-- Description text in Hindi -->
        <p class="hindi-text text-lg sm:text-xl text-gray-300 mb-8 leading-relaxed font-medium px-2">
            आपके शहर में हाई प्रोफाइल लेडीज के साथ <span class="text-pink-400 font-bold">रियल मीटिंग</span>
        </p>

        <!-- Join Button -->
        <a href="https://t.me/+Fdi4oZXRdqU5YzE1" target="_blank" 
           class="group w-full py-4 px-6 bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 rounded-2xl transition-all duration-300 flex flex-col items-center justify-center btn-glow transform hover:scale-[1.02] active:scale-95 mb-10 border border-pink-400/50">
            <div class="flex items-center space-x-3 mb-1">
                <!-- Telegram Icon SVG -->
                <svg class="w-7 h-7 text-white animate-bounce" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.14.18-.357.295-.6.295-.002 0-.003 0-.005 0l.213-3.054 5.56-5.022c.24-.213-.054-.334-.373-.121l-6.869 4.326-2.96-.924c-.64-.203-.658-.64.135-.954l11.566-4.458c.538-.196 1.006.128.832.94z"/>
                </svg>
                <span class="text-white text-2xl font-bold tracking-wide">JOIN FREE TELEGRAM</span>
            </div>
            <span class="text-pink-100 text-sm font-semibold tracking-widest uppercase opacity-80 group-hover:opacity-100 transition-opacity">
                Tap Here to Join Now
            </span>
        </a>

        <!-- Image Container (Moved below the button) -->
        <div class="relative w-full overflow-hidden rounded-2xl shadow-2xl border border-white/10 group bg-black/40 flex justify-center items-center min-h-[200px]">
            <!-- Overlay gradient for premium feel -->
            <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/10 to-transparent z-10 transition-opacity group-hover:opacity-80 pointer-events-none"></div>
            
            <!-- Image tag updated to handle any size perfectly -->
            <img 
                src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" 
                alt="Fashion Model" 
                class="w-full h-auto max-h-[450px] object-contain transition-transform duration-700 group-hover:scale-105"
            >
            
            <!-- Floating status badge on image -->
            <div class="absolute bottom-4 left-4 z-20 flex items-center space-x-2 bg-black/60 backdrop-blur-md px-3 py-1.5 rounded-full border border-white/20">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                <span class="text-xs text-white font-medium">Available Now</span>
            </div>
        </div>
        
    </div>

</body>
</html>
